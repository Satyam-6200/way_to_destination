<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>way_to_destination — Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  body {
    font-family: -apple-system, sans-serif;
    margin: 0;
    background: #0b0f1a;
    color: #eee;
  }
  #header {
    padding: 12px 16px;
    background: #111827;
    border-bottom: 1px solid #232b3d;
  }
  #header h2 { margin: 0 0 8px 0; font-size: 16px; }
  #controls {
    display: flex;
    gap: 8px;
  }
  #sessionInput {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #333;
    background: #1a2232;
    color: #eee;
    font-size: 13px;
  }
  #focusBtn, #refreshBtn {
    padding: 10px 14px;
    border-radius: 6px;
    border: none;
    background: #2e7d32;
    color: white;
    font-size: 13px;
    cursor: pointer;
  }
  #refreshBtn { background: #3a4a63; }
  #status {
    padding: 8px 16px;
    background: #1a2232;
    font-size: 12px;
    color: #9aa5b8;
  }
  #map {
    height: calc(100vh - 260px);
    width: 100%;
    background: #0b0f1a;
  }
  .leaflet-container { background: #0b0f1a; }
  #videoPanel {
    padding: 10px 16px;
    background: #0d1420;
    border-bottom: 1px solid #232b3d;
  }
  #chunkVideo {
    width: 100%;
    max-height: 160px;
    border-radius: 6px;
    background: #000;
    display: none;
  }
  #videoInfo {
    font-size: 12px;
    color: #9aa5b8;
    margin-top: 6px;
  }
</style>
</head>
<body>

<div id="header">
  <h2>🗺️ way_to_destination — recorded paths (all users)</h2>
  <div id="controls">
    <input id="sessionInput" type="text" placeholder="Paste a session_id to zoom to it (optional)" />
    <button id="focusBtn">Zoom</button>
    <button id="refreshBtn">Refresh</button>
  </div>
</div>
<div id="status">Loading all recorded sessions...</div>
<div id="videoPanel">
  <video id="chunkVideo" controls playsinline></video>
  <div id="videoInfo">Tap a point on any path to play its video.</div>
</div>
<div id="map"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
const BACKEND_URL = "https://way-to-destination.onrender.com";

const statusEl = document.getElementById('status');
const sessionInput = document.getElementById('sessionInput');
const focusBtn = document.getElementById('focusBtn');
const refreshBtn = document.getElementById('refreshBtn');
const videoEl = document.getElementById('chunkVideo');
const videoInfoEl = document.getElementById('videoInfo');

function setStatus(msg) {
  statusEl.textContent = msg;
}

// Base map: no tile layer (no Google/OSM raster tiles). Just a plain
// coordinate canvas + our own downloaded coastline outline for context.
const map = L.map('map', {
  worldCopyJump: true
}).setView([22.5, 82.0], 4); // rough center on India by default

fetch('data/world.geo.json')
  .then(r => r.json())
  .then(geo => {
    L.geoJSON(geo, {
      style: { color: '#3a4a63', weight: 1, fillColor: '#151d2e', fillOpacity: 1 }
    }).addTo(map);
  })
  .catch(err => console.warn('Could not load coastline outline:', err.message));

// A distinct color per session so overlapping paths from different users
// are easy to tell apart
const COLORS = ['#4fc3f7', '#ef5350', '#ffca28', '#ab47bc', '#66bb6a', '#ff7043', '#26c6da', '#ec407a'];

function haversineDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = deg => deg * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2) ** 2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
            Math.sin(dLon/2) ** 2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
}

function formatDistance(meters) {
  if (meters < 1000) return `${meters.toFixed(1)} m`;
  return `${(meters / 1000).toFixed(2)} km`;
}

// Chrome bug workaround: webm files from MediaRecorder often report
// duration as Infinity. Seeking directly can silently fail. Trick: seek to
// a huge time first to force Chrome to compute the real duration.
function seekVideo(el, desiredTime) {
  if (isFinite(el.duration) && el.duration > 0) {
    el.currentTime = desiredTime;
    return;
  }
  el.addEventListener('timeupdate', () => { el.currentTime = desiredTime; }, { once: true });
  el.currentTime = 1e101;
}

videoEl.onerror = () => {
  const err = videoEl.error;
  const reasons = { 1: 'aborted', 2: 'network error', 3: 'decode error', 4: 'format not supported' };
  if (err) videoInfoEl.textContent = `⚠ Video error: ${reasons[err.code] || err.code}`;
};

async function playPoint(p, sessionId, chunkStartTime) {
  const videoUrl = p.video_url;
  const offsetSeconds = Math.max(0, (p.t - (chunkStartTime[p.chunk_index] ?? p.t)) / 1000);

  if (!videoUrl) {
    videoInfoEl.textContent = '⚠ No video URL for this point.';
    return;
  }

  videoEl.style.display = 'block';
  videoEl.muted = true;
  videoInfoEl.textContent = `Checking video for chunk ${p.chunk_index}...`;

  try {
    const check = await fetch(videoUrl, { method: 'GET', headers: { Range: 'bytes=0-1' } });
    if (!check.ok && check.status !== 206) {
      videoInfoEl.textContent = `⚠ Video not found (HTTP ${check.status}).`;
      return;
    }
  } catch (err) {
    videoInfoEl.textContent = `⚠ Could not reach video storage: ${err.message}`;
    return;
  }

  videoInfoEl.textContent = `Playing session ${sessionId.slice(0, 8)}… chunk ${p.chunk_index}, ${formatDistance(p.cumulativeDistance)} into path...`;

  const key = `${sessionId}:${p.chunk_index}`;
  if (videoEl.dataset.currentKey !== key) {
    videoEl.src = videoUrl;
    videoEl.dataset.currentKey = key;
    videoEl.addEventListener('loadedmetadata', function seekOnce() {
      seekVideo(videoEl, offsetSeconds);
      videoEl.removeEventListener('loadedmetadata', seekOnce);
    });
  } else {
    seekVideo(videoEl, offsetSeconds);
  }
  videoEl.play().catch(() => {
    videoInfoEl.textContent += ' (tap play button — autoplay blocked)';
  });
}

// sessionId -> { pathLayer, markerLayer, bounds }
const sessionLayers = {};

async function renderSession(sessionData, color) {
  const allPoints = [];
  sessionData.chunks.forEach(chunk => {
    chunk.gps_points.forEach(p => {
      allPoints.push({ ...p, chunk_index: chunk.chunk_index, video_url: chunk.video_url });
    });
  });
  if (allPoints.length === 0) return null;

  let cumulativeDistance = 0;
  allPoints.forEach((p, i) => {
    if (i > 0) {
      cumulativeDistance += haversineDistance(allPoints[i-1].lat, allPoints[i-1].lng, p.lat, p.lng);
    }
    p.cumulativeDistance = cumulativeDistance;
  });

  const chunkStartTime = {};
  sessionData.chunks.forEach(chunk => {
    if (chunk.gps_points.length > 0) chunkStartTime[chunk.chunk_index] = chunk.gps_points[0].t;
  });

  let placeNames = [];
  try {
    const geoRes = await fetch(`${BACKEND_URL}/geocode/batch`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(allPoints.map(p => ({ lat: p.lat, lng: p.lng })))
    });
    if (geoRes.ok) placeNames = await geoRes.json();
  } catch (err) { /* non-critical */ }

  const latlngs = allPoints.map(p => [p.lat, p.lng]);
  const pathLayer = L.polyline(latlngs, { color, weight: 4, opacity: 0.8 }).addTo(map);

  const markerLayer = L.layerGroup();
  allPoints.forEach((p, i) => {
    const place = placeNames[i];
    const placeText = place ? `${place.name}, ${place.admin2}, ${place.admin1}<br>` : '';
    const marker = L.circleMarker([p.lat, p.lng], {
      radius: 4, color, fillColor: color, fillOpacity: 0.9
    }).bindPopup(
      `<b>Session ${sessionData.session_id.slice(0, 8)}… — point ${i}</b><br>${placeText}` +
      `t=${p.t}ms<br>chunk: ${p.chunk_index}<br>distance so far: ${formatDistance(p.cumulativeDistance)}` +
      `<br><small>tap marker to play video</small>`
    );
    marker.on('click', () => playPoint(p, sessionData.session_id, chunkStartTime));
    markerLayer.addLayer(marker);
  });
  markerLayer.addTo(map);

  return {
    pathLayer, markerLayer,
    bounds: pathLayer.getBounds(),
    totalDistance: cumulativeDistance,
    pointCount: allPoints.length,
    startPlace: placeNames[0] || null
  };
}

async function loadAllSessions() {
  setStatus('Loading all recorded sessions...');

  // Clear any existing layers (used on refresh)
  Object.values(sessionLayers).forEach(s => {
    map.removeLayer(s.pathLayer);
    map.removeLayer(s.markerLayer);
  });
  for (const k in sessionLayers) delete sessionLayers[k];

  let sessions;
  try {
    const res = await fetch(`${BACKEND_URL}/sessions/full`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    sessions = await res.json();
  } catch (err) {
    setStatus(`⚠ Could not load sessions: ${err.message} (backend may be waking up — try Refresh in ~30s)`);
    return;
  }

  if (sessions.length === 0) {
    setStatus('No recordings yet. Record something on the capture page first.');
    return;
  }

  let totalPoints = 0, totalDistance = 0, allBounds = null;
  for (let i = 0; i < sessions.length; i++) {
    const color = COLORS[i % COLORS.length];
    const rendered = await renderSession(sessions[i], color);
    if (!rendered) continue;
    sessionLayers[sessions[i].session_id] = rendered;
    totalPoints += rendered.pointCount;
    totalDistance += rendered.totalDistance;
    allBounds = allBounds ? allBounds.extend(rendered.bounds) : rendered.bounds;
  }

  if (allBounds) map.fitBounds(allBounds, { padding: [40, 40] });

  setStatus(`Showing ${Object.keys(sessionLayers).length} recorded path(s), ${totalPoints} GPS points total, ${formatDistance(totalDistance)} combined distance. Tap any colored point to play its video.`);
}

focusBtn.addEventListener('click', () => {
  const id = sessionInput.value.trim();
  const layer = sessionLayers[id];
  if (layer) {
    map.fitBounds(layer.bounds, { padding: [40, 40] });
  } else {
    setStatus(`Session ${id} not found among loaded paths (check the ID, or Refresh if it was just recorded).`);
  }
});

refreshBtn.addEventListener('click', loadAllSessions);

loadAllSessions();
</script>

</body>
</html>
