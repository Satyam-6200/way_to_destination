<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>way_to_destination — Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  body {
    font-family: -apple-system, sans-serif;
    margin: 0;
    background: #0b0f1a;
    color: #eee;
  }
  #header {
    padding: 12px 16px;
    background: #111827;
    border-bottom: 1px solid #232b3d;
  }
  #header h2 { margin: 0 0 8px 0; font-size: 16px; }
  #controls {
    display: flex;
    gap: 8px;
  }
  #sessionInput {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #333;
    background: #1a2232;
    color: #eee;
    font-size: 13px;
  }
  #loadBtn {
    padding: 10px 16px;
    border-radius: 6px;
    border: none;
    background: #2e7d32;
    color: white;
    font-size: 13px;
    cursor: pointer;
  }
  #status {
    padding: 8px 16px;
    background: #1a2232;
    font-size: 12px;
    color: #9aa5b8;
  }
  #map {
    height: calc(100vh - 260px);
    width: 100%;
    background: #0b0f1a;
  }
  .leaflet-container { background: #0b0f1a; }
  #videoPanel {
    padding: 10px 16px;
    background: #0d1420;
    border-bottom: 1px solid #232b3d;
  }
  #chunkVideo {
    width: 100%;
    max-height: 160px;
    border-radius: 6px;
    background: #000;
    display: none;
  }
  #videoInfo {
    font-size: 12px;
    color: #9aa5b8;
    margin-top: 6px;
  }
</style>
</head>
<body>

<div id="header">
  <h2>🗺️ way_to_destination — recorded path viewer</h2>
  <div id="controls">
    <input id="sessionInput" type="text" placeholder="Paste session_id here (or leave blank for most recent)" />
    <button id="loadBtn">Load</button>
  </div>
</div>
<div id="status">Enter a session_id from a recording, or click Load to fetch the most recent session.</div>
<div id="videoPanel">
  <video id="chunkVideo" controls playsinline></video>
  <div id="videoInfo">Click a point on the path to play its video.</div>
</div>
<div id="map"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
const BACKEND_URL = "https://way-to-destination.onrender.com";

const statusEl = document.getElementById('status');
const sessionInput = document.getElementById('sessionInput');
const loadBtn = document.getElementById('loadBtn');

function setStatus(msg) {
  statusEl.textContent = msg;
}

// Base map: no tile layer (no Google/OSM raster tiles). Just a plain
// coordinate canvas + our own downloaded coastline outline for context.
const map = L.map('map', {
  worldCopyJump: true
}).setView([22.5, 82.0], 4); // rough center on India by default

let coastlineLayer = null;
let pathLayer = null;
let markerLayer = null;

fetch('data/world.geo.json')
  .then(r => r.json())
  .then(geo => {
    coastlineLayer = L.geoJSON(geo, {
      style: {
        color: '#3a4a63',
        weight: 1,
        fillColor: '#151d2e',
        fillOpacity: 1
      }
    }).addTo(map);
  })
  .catch(err => setStatus('Could not load coastline outline: ' + err.message));

function haversineDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000; // Earth radius in meters
  const toRad = deg => deg * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2) ** 2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
            Math.sin(dLon/2) ** 2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
}

function formatDistance(meters) {
  if (meters < 1000) return `${meters.toFixed(1)} m`;
  return `${(meters / 1000).toFixed(2)} km`;
}

// Chrome bug workaround: webm files from MediaRecorder often have duration
// reported as Infinity (the header doesn't know final length while
// recording). Seeking directly on such a video can silently fail / freeze
// the frame. Trick: seek to a huge time first to force Chrome to compute
// the real duration, then seek to where we actually want.
function seekVideo(videoEl, desiredTime) {
  if (isFinite(videoEl.duration) && videoEl.duration > 0) {
    videoEl.currentTime = desiredTime;
    return;
  }
  const fixDuration = () => {
    videoEl.currentTime = desiredTime;
  };
  videoEl.addEventListener('timeupdate', fixDuration, { once: true });
  videoEl.currentTime = 1e101;
}

async function loadSession(sessionId) {
  setStatus('Fetching session data...');
  let url = sessionId
    ? `${BACKEND_URL}/session/${sessionId}`
    : null;

  try {
    if (!sessionId) {
      // No session given — fetch list and use the most recent one
      const listRes = await fetch(`${BACKEND_URL}/sessions`);
      if (!listRes.ok) throw new Error(`sessions list failed: ${listRes.status}`);
      const sessions = await listRes.json();
      if (sessions.length === 0) {
        setStatus('No sessions found on backend yet. Record something first.');
        return;
      }
      sessionId = sessions[0].session_id;
      sessionInput.value = sessionId;
      url = `${BACKEND_URL}/session/${sessionId}`;
    }

    const res = await fetch(url);
    if (!res.ok) throw new Error(`session fetch failed: ${res.status}`);
    const data = await res.json();

    // Flatten all GPS points from all chunks, in order
    const allPoints = [];
    data.chunks.forEach(chunk => {
      chunk.gps_points.forEach(p => {
        allPoints.push({ ...p, chunk_index: chunk.chunk_index, video_url: chunk.video_url });
      });
    });

    if (allPoints.length === 0) {
      setStatus('This session has no GPS points recorded.');
      return;
    }

    // Calculate cumulative distance along the path
    let cumulativeDistance = 0;
    allPoints.forEach((p, i) => {
      if (i > 0) {
        cumulativeDistance += haversineDistance(
          allPoints[i-1].lat, allPoints[i-1].lng, p.lat, p.lng
        );
      }
      p.cumulativeDistance = cumulativeDistance;
    });
    const totalDistance = cumulativeDistance;

    // Clear previous layers
    if (pathLayer) map.removeLayer(pathLayer);
    if (markerLayer) map.removeLayer(markerLayer);

    const latlngs = allPoints.map(p => [p.lat, p.lng]);

    pathLayer = L.polyline(latlngs, {
      color: '#4fc3f7',
      weight: 4,
      opacity: 0.85
    }).addTo(map);

    // Track the first timestamp of each chunk so we can seek within its video
    const chunkStartTime = {};
    data.chunks.forEach(chunk => {
      if (chunk.gps_points.length > 0) {
        chunkStartTime[chunk.chunk_index] = chunk.gps_points[0].t;
      }
    });

    // Batch reverse-geocode all points at once (fewer requests than one-by-one)
    let placeNames = [];
    try {
      const geoRes = await fetch(`${BACKEND_URL}/geocode/batch`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(allPoints.map(p => ({ lat: p.lat, lng: p.lng })))
      });
      if (geoRes.ok) placeNames = await geoRes.json();
    } catch (err) {
      // non-critical — markers will just show without place names
    }

    const videoEl = document.getElementById('chunkVideo');
    const videoInfoEl = document.getElementById('videoInfo');

    markerLayer = L.layerGroup();
    allPoints.forEach((p, i) => {
      const place = placeNames[i];
      const placeText = place ? `${place.name}, ${place.admin2}, ${place.admin1}<br>` : '';
      const marker = L.circleMarker([p.lat, p.lng], {
        radius: 4,
        color: '#66bb6a',
        fillColor: '#66bb6a',
        fillOpacity: 0.9
      }).bindPopup(
        `<b>Point ${i}</b><br>${placeText}t=${p.t}ms<br>chunk: ${p.chunk_index}<br>distance so far: ${formatDistance(p.cumulativeDistance)}<br><small>tap marker to play video</small>`
      );

      marker.on('click', async () => {
        const videoUrl = p.video_url;
        const offsetSeconds = Math.max(0, (p.t - (chunkStartTime[p.chunk_index] || p.t)) / 1000);

        if (!videoUrl) {
          videoInfoEl.textContent = '⚠ No video URL for this point.';
          return;
        }

        videoEl.style.display = 'block';
        videoEl.muted = true;
        videoInfoEl.textContent = `Checking video for chunk ${p.chunk_index}...`;

        try {
          const check = await fetch(videoUrl, { method: 'GET', headers: { Range: 'bytes=0-1' } });
          if (!check.ok && check.status !== 206) {
            videoInfoEl.textContent = `⚠ Video not found (HTTP ${check.status}).`;
            return;
          }
        } catch (err) {
          videoInfoEl.textContent = `⚠ Could not reach video storage: ${err.message}`;
          return;
        }

        videoInfoEl.textContent = `Playing chunk ${p.chunk_index} (point ${i}, ${formatDistance(p.cumulativeDistance)} into path)...`;

        if (videoEl.dataset.currentChunk !== String(p.chunk_index)) {
          videoEl.src = videoUrl;
          videoEl.dataset.currentChunk = String(p.chunk_index);
          videoEl.addEventListener('loadedmetadata', function seekOnce() {
            seekVideo(videoEl, offsetSeconds);
            videoEl.removeEventListener('loadedmetadata', seekOnce);
          });
        } else {
          seekVideo(videoEl, offsetSeconds);
        }
        videoEl.play().catch(() => {
          videoInfoEl.textContent += ' (tap play button — autoplay blocked)';
        });
      });

      videoEl.onerror = () => {
        const err = videoEl.error;
        const reasons = { 1: 'aborted', 2: 'network error', 3: 'decode error (corrupt/unsupported file)', 4: 'format not supported' };
        if (err) videoInfoEl.textContent = `⚠ Video error: ${reasons[err.code] || err.code}`;
      };

      markerLayer.addLayer(marker);
    });
    markerLayer.addTo(map);

    map.fitBounds(pathLayer.getBounds(), { padding: [40, 40] });
    const startPlace = placeNames[0];
    const placeSummary = startPlace ? ` Near ${startPlace.name}, ${startPlace.admin2}, ${startPlace.admin1}.` : '';
    setStatus(`Loaded session ${sessionId} — ${allPoints.length} GPS points, ${data.chunks.length} chunks, total distance: ${formatDistance(totalDistance)}.${placeSummary}`);
  } catch (err) {
    setStatus('Error: ' + err.message);
  }
}

loadBtn.addEventListener('click', () => {
  loadSession(sessionInput.value.trim() || null);
});
</script>

</body>
</html>
